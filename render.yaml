# Render Blueprint — deploys the GlassBox FastAPI backend (dashboard + verifier + API).
# In Render: New → Blueprint → connect this repo → it reads this file and prompts for the
# two secret env vars below (sync:false). Free plan spins down when idle (~30s cold start).
services:
  - type: web
    name: glassbox
    runtime: python
    plan: free
    branch: main
    # pysui (Sui anchoring) is an OPTIONAL, lazily-imported dep that fails to build on
    # Python 3.13 in Render's build image — and anchoring is off here (AUDIT_SINK=walrus,
    # ANCHOR=none), so the app never imports it. Install the runtime deps WITHOUT pysui.
    buildCommand: pip install fastapi "uvicorn[standard]" requests pydantic python-dotenv cryptography
    startCommand: cd server && python -m uvicorn glassbox.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.13.5"
      # Stable ed25519 signing key so the published pubkey keeps matching across restarts.
      # Paste the value from:  cat /tmp/glassbox_sk.hex   (kept off this repo / chat)
      - key: GLASSBOX_ED25519_SK_HEX
        sync: false
      - key: LLM_PROVIDER
        value: gemini
      # Smart model = flash too: fast + cheap. Render has no 30s request cap, so the
      # multi-agent debate completes comfortably even on the smart/arbiter step.
      - key: GEMINI_MODEL_SMART
        value: gemini-2.5-flash
      # Your Gemini key (or switch LLM_PROVIDER=openrouter + set OPENROUTER_API_KEY).
      - key: GEMINI_API_KEY
        sync: false
      - key: AUDIT_SINK
        value: walrus
      # Allow the Next.js website service (below) to call this API from the browser.
      # After first deploy, set this to the website's Render URL, e.g.
      #   https://glassbox-website.onrender.com   (comma-separate if more than one)
      - key: CORS_ORIGINS
        sync: false
      # Generous timeouts — no Heroku-style 30s router cap on Render, so let slow calls finish
      # instead of falling back early. (Code defaults are 12 / 5 for Heroku's tight budget.)
      - key: LLM_TIMEOUT
        value: "30"
      - key: MARKET_HTTP_TIMEOUT
        value: "8"

  # ── The NEW Next.js website (dashboard + chat + marketing). Hand-built in website/.
  # Node web service; talks to the brain above over HTTP. NEXT_PUBLIC_API_BASE is
  # inlined at BUILD time, so it must point at the brain URL before the build runs.
  - type: web
    name: glassbox-website
    runtime: node
    plan: free
    branch: main
    rootDir: website
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "20.18.0"
      # The brain's public Render URL (the `glassbox` service above), e.g.
      #   https://glassbox.onrender.com
      # Set this BEFORE the first build (NEXT_PUBLIC_* is compiled into the bundle).
      - key: NEXT_PUBLIC_API_BASE
        sync: false
