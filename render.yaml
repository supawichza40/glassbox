# Render Blueprint — deploys the GlassBox FastAPI backend (dashboard + verifier + API).
# In Render: New → Blueprint → connect this repo → it reads this file and prompts for the
# two secret env vars below (sync:false). Free plan spins down when idle (~30s cold start).
services:
  - type: web
    name: glassbox
    runtime: python
    plan: free
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: cd server && python -m uvicorn glassbox.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.13.5"
      # Stable ed25519 signing key so the published pubkey keeps matching across restarts.
      # Paste the value from:  cat /tmp/glassbox_sk.hex   (kept off this repo / chat)
      - key: GLASSBOX_ED25519_SK_HEX
        sync: false
      - key: LLM_PROVIDER
        value: gemini
      # Smart model = flash too: fast + cheap. Render has no 30s request cap, so the
      # multi-agent debate completes comfortably even on the smart/arbiter step.
      - key: GEMINI_MODEL_SMART
        value: gemini-2.5-flash
      # Your Gemini key (or switch LLM_PROVIDER=openrouter + set OPENROUTER_API_KEY).
      - key: GEMINI_API_KEY
        sync: false
      - key: AUDIT_SINK
        value: walrus
      # Generous timeouts — no Heroku-style 30s router cap on Render, so let slow calls finish
      # instead of falling back early. (Code defaults are 12 / 5 for Heroku's tight budget.)
      - key: LLM_TIMEOUT
        value: "30"
      - key: MARKET_HTTP_TIMEOUT
        value: "8"
