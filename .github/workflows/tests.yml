name: tests

on: [push, pull_request]

jobs:
  pytest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps (no pysui — Tier 2, not needed for tests)
        run: pip install fastapi "uvicorn[standard]" requests pydantic python-dotenv cryptography httpx pytest
      - name: Run tests
        run: python -m pytest -q
